<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bíblia Sagrada 365</title>
    <style>
        :root {
            --ouro: #D4AF37;
            --fundo: #000000;
            --card: #151515;
            --texto: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }

        body { 
            background-color: var(--fundo); 
            color: var(--texto); 
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 450px; }

        header { text-align: center; margin-bottom: 30px; }
        header h1 { font-size: 28px; color: var(--ouro); }
        header p { color: #888; font-size: 14px; margin-top: 5px; }

        /* Sorteio */
        .caixa-sorteio {
            background: var(--card);
            border: 2px solid #333;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            margin-bottom: 30px;
        }
        .promessa-texto { font-size: 20px; font-style: italic; margin-bottom: 15px; color: #eee; line-height: 1.4; min-height: 80px; display: flex; align-items: center; justify-content: center; }
        .promessa-ref { color: var(--ouro); font-weight: bold; font-size: 16px; margin-bottom: 20px; display: block; }
        
        .btn-sortear {
            background: #222; color: var(--ouro); border: 1px solid var(--ouro);
            padding: 12px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%;
            transition: 0.3s;
        }
        .btn-sortear:active { background: var(--ouro); color: black; }

        /* Plano de Leitura */
        .plano-leitura {
            background: var(--ouro);
            color: black;
            border-radius: 25px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
        }
        .instrucao-leitura { font-size: 26px; font-weight: 900; margin-bottom: 20px; line-height: 1.2; min-height: 65px; }
        .progresso-dia { font-size: 14px; font-weight: bold; margin-bottom: 25px; display: block; }

        /* Botões de Ação */
        .btn-concluir {
            background: black;
            color: white;
            border: none;
            padding: 20px;
            border-radius: 15px;
            width: 100%;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-concluir:active { transform: scale(0.95); background: #333; }

        .btn-voltar {
            background: rgba(0,0,0,0.1);
            color: #222;
            border: 1px solid rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 10px;
            width: 100%;
            font-size: 14px;
            margin-top: 15px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-reset { 
            margin-top: 40px; background: none; border: none; color: #333; 
            text-decoration: underline; cursor: pointer; font-size: 11px; width: 100%;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Bíblia Sagrada</h1>
        <p>Gênesis a Apocalipse</p>
    </header>

    <div class="caixa-sorteio">
        <p class="promessa-texto" id="txt-sorteio">"Clique abaixo para tirar uma promessa do dia."</p>
        <span class="promessa-ref" id="ref-sorteio">---</span>
        <button class="btn-sortear" onclick="sortearVersiculo()">SORTEAR PROMESSA</button>
    </div>

    <div class="plano-leitura">
        <span class="progresso-dia" id="info-dia">Dia 1 de 365</span>
        <p class="instrucao-leitura" id="instrucao">Carregando...</p>
        
        <button class="btn-concluir" onclick="proximoDia()">JÁ TERMINEI DE LER</button>
        <button class="btn-voltar" onclick="voltarDia()">CORRIGIR: VOLTAR UM DIA</button>
    </div>

    <button class="btn-reset" onclick="comecarDoZero()">Reiniciar Plano (Dia 1)</button>
</div>

<script>
    // Lista ampliada de promessas
    const promessas = [
        {t: "O Senhor é o meu pastor, nada me faltará.", r: "Salmos 23:1"},
        {t: "Tudo posso naquele que me fortalece.", r: "Filipenses 4:13"},
        {t: "Deus é o nosso refúgio e fortaleza, socorro bem presente na angústia.", r: "Salmos 46:1"},
        {t: "A alegria do Senhor é a vossa força.", r: "Neemias 8:10"},
        {t: "Lâmpada para os meus pés é tua palavra, e luz para o meu caminho.", r: "Salmos 119:105"},
        {t: "Não fui eu que ordenei? Seja forte e corajoso! Não se apavore.", r: "Josué 1:9"},
        {t: "Entregue o seu caminho ao Senhor; confie nele, e ele agirá.", r: "Salmos 37:5"},
        {t: "O Senhor te abençoe e te guarde.", r: "Números 6:24"},
        {t: "Lancem sobre ele toda a vossa ansiedade, porque ele tem cuidado de vós.", r: "1 Pedro 5:7"},
        {t: "Pois eu bem sei os planos que tenho para vós, planos de paz.", r: "Jeremias 29:11"},
        {t: "Sabemos que todas as coisas cooperam para o bem dos que amam a Deus.", r: "Romanos 8:28"},
        {t: "O meu Deus suprirá todas as vossas necessidades.", r: "Filipenses 4:19"},
        {t: "Clama a mim, e responder-te-ei, e anunciar-te-ei coisas grandes.", r: "Jeremias 33:3"},
        {t: "Ainda que eu andasse pelo vale da sombra da morte, não temeria mal.", r: "Salmos 23:4"},
        {t: "Peçam, e lhes será dado; busquem, e encontrarão.", r: "Mateus 7:7"},
        {t: "Deixo-vos a paz, a minha paz vos dou; não a dou como o mundo a dá.", r: "João 14:27"},
        {t: "Mil cairão ao teu lado, dez mil à tua direita, mas não chegará a ti.", r: "Salmos 91:7"},
        {t: "O Senhor é bom, um refúgio em tempos de angústia.", r: "Naum 1:7"},
        {t: "O choro pode durar uma noite, mas a alegria vem pela manhã.", r: "Salmos 30:5"},
        {t: "Se Deus é por nós, quem será contra nós?", r: "Romanos 8:31"},
        {t: "Vinde a mim, todos os que estais cansados, e eu vos aliviarei.", r: "Mateus 11:28"},
        {t: "Aquele que habita no esconderijo do Altíssimo descansará.", r: "Salmos 91:1"},
        {t: "Espera no Senhor, anima-te, e ele fortalecerá o teu coração.", r: "Salmos 27:14"},
        {t: "Porque para Deus nada é impossível.", r: "Lucas 1:37"},
        {t: "O coração em paz dá vida ao corpo.", r: "Provérbios 14:30"},
        {t: "Deus é amor.", r: "1 João 4:8"},
        {t: "O Senhor lutará por vocês; tão somente acalmem-se.", r: "Êxodo 14:14"},
        {t: "Grandes coisas fez o Senhor por nós, por isso estamos alegres.", r: "Salmos 126:3"},
        {t: "Seja a vossa moderação conhecida de todos os homens. Perto está o Senhor.", r: "Filipenses 4:5"},
        {t: "Pela manhã ouve, Senhor, a minha voz.", r: "Salmos 5:3"}
    ];

    const ordemBiblica = [
        "Gênesis", "Êxodo", "Levítico", "Números", "Deuteronômio", "Josué", "Juízes", "Rute", 
        "1 Samuel", "2 Samuel", "1 Reis", "2 Reis", "1 Crônicas", "2 Crônicas", "Esdras", "Neemias", "Ester",
        "Jó", "Salmos", "Provérbios", "Eclesiastes", "Cantares", "Isaías", "Jeremias", "Lamentações", 
        "Ezequiel", "Daniel", "Oséias", "Joel", "Amós", "Obadias", "Jonas", "Miquéias", "Naum", "Habacuque", 
        "Sofonias", "Ageu", "Zacarias", "Malaquias", "Mateus", "Marcos", "Lucas", "João", "Atos", 
        "Romanos", "1 Coríntios", "2 Coríntios", "Gálatas", "Efésios", "Filipenses", "Colossenses", 
        "1 Tessalonicenses", "2 Tessalonicenses", "1 Timóteo", "2 Timóteo", "Tito", "Filemom", "Hebreus", 
        "Tiago", "1 Pedro", "2 Pedro", "1 João", "2 João", "3 João", "Judas", "Apocalipse"
    ];

    let diaAtual = parseInt(localStorage.getItem('biblia_dia_vovó')) || 1;

    function atualizarTela() {
        document.getElementById('info-dia').innerText = "Você está no Dia " + diaAtual + " de 365";
        
        let livroIndex = Math.floor((diaAtual - 1) / 5.6); 
        if (livroIndex >= ordemBiblica.length) livroIndex = ordemBiblica.length - 1;
        
        let livro = ordemBiblica[livroIndex];
        let capInicio = ((diaAtual - 1) % 6) * 3 + 1;
        let capFim = capInicio + 2;

        document.getElementById('instrucao').innerHTML = "Livro de " + livro + ", <br>do Capítulo " + capInicio + " ao " + capFim;
    }

    function proximoDia() {
        if (diaAtual < 365) {
            diaAtual++;
            salvar();
        } else {
            alert("Parabéns! Você completou a jornada bíblica!");
        }
    }

    function voltarDia() {
        if (diaAtual > 1) {
            diaAtual--;
            salvar();
        } else {
            alert("Você já está no começo.");
        }
    }

    function salvar() {
        localStorage.setItem('biblia_dia_vovó', diaAtual);
        atualizarTela();
    }

    function sortearVersiculo() {
        const sorteio = promessas[Math.floor(Math.random() * promessas.length)];
        document.getElementById('txt-sorteio').innerText = '"' + sorteio.t + '"';
        document.getElementById('ref-sorteio').innerText = sorteio.r;
    }

    function comecarDoZero() {
        if (confirm("Quer mesmo voltar para o Dia 1?")) {
            diaAtual = 1;
            salvar();
        }
    }

    atualizarTela();
</script>

</body>
</html>
